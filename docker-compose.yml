# Development — in-memory storage, no auth required
# Usage: docker-compose up
services:
  authcore:
    build: .
    ports:
      - "8080:8080"
    environment:
      AUTHCORE_ENV: local
      AUTHCORE_CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3
