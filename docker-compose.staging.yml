# Staging — Postgres + Redis, API key auth
# Usage: docker-compose -f docker-compose.staging.yml up
services:
  authcore:
    build: .
    ports:
      - "8080:8080"
    environment:
      AUTHCORE_ENV: staging
      AUTHCORE_DATABASE_DSN: postgres://authcore:authcore_staging@postgres:5432/authcore?sslmode=disable
      AUTHCORE_REDIS_URL: redis://redis:6379
      AUTHCORE_ADMIN_API_KEY: staging-admin-key-change-me
      AUTHCORE_ISSUER: http://localhost:8080
      AUTHCORE_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      AUTHCORE_TENANT_MODE: header
      AUTHCORE_KEY_ROTATION_DAYS: "90"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authcore
      POSTGRES_USER: authcore
      POSTGRES_PASSWORD: authcore_staging
    ports:
      - "5432:5432"
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authcore"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_staging:
